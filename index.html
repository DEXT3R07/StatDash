<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>StatDash</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">

<style>

</style>
</head>

<body>

<h1>StatDash</h1>

<div class="container">

  <div class="card" id="rows">
    <div class="row">
      <input class="name" value="Rent">
      <input class="value" type="number" value="200">
    </div>
    <div class="row">
      <input class="name" value="Food">
      <input class="value" type="number" value="300">
    </div>
    <div class="row">
      <input class="name" value="Transport">
      <input class="value" type="number" value="600">
    </div>
  </div>

  <button onclick="addRow()">+ Add Row</button>
  <button onclick="generateCharts()">Generate Charts</button>

  <div class="card">
    <canvas id="bar"></canvas>
  </div>

  <div class="card">
    <canvas id="pie"></canvas>
  </div>

  <div class="card summary">
    <div>Total: <span id="total"></span></div>
    <div>Average: <span id="avg"></span></div>
    <div>Highest: <span id="high"></span></div>
    <div>Lowest: <span id="low"></span></div>
    <div>Top: <span id="top"></span></div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
